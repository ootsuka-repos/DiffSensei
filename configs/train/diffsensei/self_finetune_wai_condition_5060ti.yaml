# Stage 2 (condition): character injection (IP) + dialog/layout control on a 5060 Ti (16GB).
#
# Base UNet/VAE/text-encoders : WAI Illustrious (good bishoujo / manga B&W art), kept FROZEN.
# Character-injection (`*_ip`) + dialog modules : grafted from the released DiffSensei as
#   initialization (`diffsensei_ip_only: true`), then TRAINED (`unet_trained_parameters: new`)
#   so they realign to WAI's attention -> fixes the garbled IP output seen when only grafting.
# The Resampler (image_proj) is also initialized from DiffSensei and trained.
exp_name: "5060ti_wai_cond"

model:
  pretrained_model_path: "checkpoints/wai-illustrious-diffusers"   # anime base (frozen)
  diffsensei_pretrained_path: "checkpoints/diffsensei/image_generator"
  diffsensei_ip_only: true        # graft ONLY IP/dialog modules (keep WAI drawing weights)
  manga_t2i_model_path: null
  pretrained_ip_adapter_path: null
  manga_pretrained_model_path: null
  image_encoder_path: "C:/Users/admin/.cache/huggingface/hub/models--h94--IP-Adapter/snapshots/018e402774aeeddd60609b4ecdb7e298259dc729/models/image_encoder"
  magi_image_encoder_path: "ragavsachdeva/magi"
  unet_trained_parameters: new    # train _ip + dialog modules; WAI base stays frozen
  lora_rank: 32

  ip_adapter_plus: true
  max_num_ips: 4
  num_vision_tokens: 16
  num_dummy_tokens: 16

  dialog_bbox_encode_type: "mask"
  max_num_dialogs: 8

  context_adapter: false
  pretrained_context_proj: false

  ip_contrastive_loss: null
  ip_contrastive_loss_weight: 1.0

train_data:
  type: "size_bucket"
  ann_path: data/annotations/train.json
  image_root: "data"
  t_drop_rate: 0.05
  i_drop_rate: 0.05
  c_drop_rate: 0.05
  mask_dialog: false              # keep dialog regions: this stage learns layout control
  ip_self_condition_rate: 0.5
  max_num_ip_sources: 1
  min_ip_height: 3
  min_ip_width: 3
  num_workers: 2                  # Windows: >2 workers hangs the DataLoader

optimizer:
  learning_rate: 1e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-08
  adam_weight_decay: 0.01
  use_8bit_adam: true

lr_scheduler:
  name: constant
  lr_warmup_steps: 100
  lr_num_cycles: 1
  lr_power: 1.0

train_batch_size: 1
gradient_accumulation_steps: 4
gradient_checkpointing: true
mixed_precision: bf16

max_train_steps: 2000
checkpointing_steps: []
checkpointing_interval: 300
evaluation_steps: []
evaluation_interval: 300
